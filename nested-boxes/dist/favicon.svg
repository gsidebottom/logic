<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Outer AND box -->
  <rect x="1" y="1" width="30" height="30" fill="#f8f9fc" stroke="#111" stroke-width="2" rx="2"/>
  <!-- Horizontal AND divider -->
  <line x1="1" y1="16" x2="31" y2="16" stroke="#111" stroke-width="2"/>
  <!-- Top half: two OR boxes side by side -->
  <rect x="4"  y="4" width="10" height="9" fill="none" stroke="#1a6bcc" stroke-width="1.5"/>
  <rect x="18" y="4" width="10" height="9" fill="none" stroke="#1a6bcc" stroke-width="1.5"/>
  <!-- Bottom half: AND box with divider -->
  <rect x="7" y="19" width="18" height="9" fill="none" stroke="#b35000" stroke-width="1.5"/>
  <line x1="7" y1="23.5" x2="25" y2="23.5" stroke="#b35000" stroke-width="1.5"/>
</svg>
